name: CI Develop

on:
  pull_request:
    branches: [develop]
    types: [closed]

jobs:
  ci-and-pr:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci

      # Lint + Test + Build
      - run: npm run lint
      - run: npm run test:run
      - run: npm run build
        env:
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}

      # Bundle size check
      - name: Bundle size
        run: |
          JS_SIZE=$(stat -c%s dist/assets/*.js | awk '{sum+=$1} END {print sum}')
          CSS_SIZE=$(stat -c%s dist/assets/*.css | awk '{sum+=$1} END {print sum}')
          echo "📦 JS: $((JS_SIZE / 1024))KB | CSS: $((CSS_SIZE / 1024))KB"
          if [ "$JS_SIZE" -gt 614400 ]; then
            echo "⚠️ Bundle JS > 600KB!"
            exit 1
          fi

      # Gitleaks - scan de secrets
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Criar PR para main
      - name: Create PR to main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh pr list --head develop --base main --json number -q '.[0].number')
          if [ -z "$EXISTING" ]; then
            gh pr create --base main --head develop \
              --title "Release: develop → main" \
              --body "Auto-created after successful CI on develop."
          fi
